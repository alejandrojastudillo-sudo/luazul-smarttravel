/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:50;
  background:rgba(2,8,25,.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.topbar-brand { display:flex; align-items:center; gap:10px; }
.topbar-logo  { width:36px; height:36px; object-fit:contain; border-radius:50%; }
.topbar-name  { font-size:1rem; font-weight:900; letter-spacing:1.5px; }
.topbar-name span { color:var(--blue-light); }
.topbar-back {
  display:inline-flex; align-items:center; gap:7px;
  background:rgba(11,61,145,.3); border:1px solid var(--border);
  color:var(--blue-light); font-size:.8rem; font-weight:700;
  padding:7px 16px; border-radius:25px; cursor:pointer;
  text-decoration:none; transition:background .2s;
}
.topbar-back:hover { background:rgba(11,61,145,.55); }

/* ── HERO ── */
.hero {
  text-align:center;
  padding:52px 24px 36px;
  max-width:680px;
  margin:0 auto;
}
.hero-icon { margin-bottom:18px; line-height:1; }
.hero-title { font-size:2rem; font-weight:900; margin-bottom:8px; letter-spacing:1px; }
.hero-title span { color:var(--blue-light); }
.hero-sub { font-size:.92rem; color:var(--muted); line-height:1.7; }

/* ── FILTER BAR ── */
.filter-bar {
  display:flex; flex-wrap:wrap; justify-content:center; gap:8px;
  padding:0 20px 28px;
  max-width:860px; margin:0 auto;
}
.filter-btn {
  padding:7px 18px; border-radius:25px; font-size:.78rem; font-weight:700;
  font-family:inherit; cursor:pointer; border:1px solid var(--border);
  background:rgba(5,20,60,.5); color:var(--muted);
  transition:all .15s;
}
.filter-btn:hover   { background:rgba(11,61,145,.4); color:white; }
.filter-btn.active  { background:linear-gradient(135deg,rgba(26,91,181,.6),rgba(11,61,145,.5)); color:white; border-color:rgba(100,160,255,.35); }

/* ── POSTS GRID ── */
.posts-wrap {
  max-width:860px;
  margin:0 auto;
  padding:0 20px 60px;
}
.featured-section { margin-bottom:32px; }
.section-label {
  display:flex; align-items:center; gap:10px;
  font-size:.68rem; font-weight:800; letter-spacing:2px;
  text-transform:uppercase; color:rgba(126,184,255,.5);
  margin-bottom:16px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

.posts-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(360px, 1fr));
  gap:16px;
}

/* ── POST CARD ── */
.post-card {
  background:rgba(5,20,60,.55);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  transition:transform .2s, box-shadow .2s;
  cursor:default;
  display:flex; flex-direction:column;
}
.post-card:hover {
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,.35);
}
.post-card.featured {
  border-color:rgba(245,158,11,.3);
  box-shadow:0 0 0 1px rgba(245,158,11,.15);
}
.post-card.featured .post-card-header {
  background:linear-gradient(135deg,rgba(11,45,120,.7),rgba(5,18,55,.8));
}

/* Card with image */
.post-img {
  width:100%; height:180px; object-fit:cover;
  border-bottom:1px solid var(--border);
}

.post-card-header {
  padding:18px 20px 14px;
  background:rgba(5,15,45,.4);
  display:flex; align-items:flex-start; gap:13px;
}
.post-emoji-wrap { font-size:2rem; line-height:1; flex-shrink:0; margin-top:2px; }
.post-title-wrap { flex:1; min-width:0; }
.post-title {
  font-size:.97rem; font-weight:800; color:#fff;
  line-height:1.3; margin-bottom:6px;
}
.post-badges { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }

/* tipo badges */
.badge-tipo { font-size:.62rem; font-weight:800; padding:2px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px; }
.tipo-novedad  { background:rgba(11,61,145,.45);  color:#93c5fd; border:1px solid rgba(59,130,246,.3); }
.tipo-tip      { background:rgba(16,185,129,.18); color:#6ee7b7; border:1px solid rgba(16,185,129,.3); }
.tipo-alerta   { background:rgba(239,68,68,.14);  color:#fca5a5; border:1px solid rgba(239,68,68,.25); }
.tipo-promo    { background:rgba(245,158,11,.18); color:#fcd34d; border:1px solid rgba(245,158,11,.3); }
.tipo-logro    { background:rgba(139,92,246,.18); color:#c4b5fd; border:1px solid rgba(139,92,246,.3); }

.badge-featured {
  display:inline-flex; align-items:center; gap:4px;
  background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.25);
  color:#fcd34d; font-size:.62rem; font-weight:800; padding:2px 9px; border-radius:20px;
}

.post-card-body {
  padding:14px 20px 18px;
  flex:1;
}
.post-body-text {
  font-size:.85rem; color:rgba(190,215,255,.8);
  line-height:1.75;
}
.post-card-footer {
  padding:10px 20px 14px;
  border-top:1px solid rgba(100,160,255,.1);
  display:flex; align-items:center; justify-content:space-between;
}
.post-date { font-size:.7rem; color:var(--muted); }
.post-equipo { font-size:.68rem; color:rgba(126,184,255,.45); font-weight:600; letter-spacing:.5px; }

/* ── LOADING / EMPTY / ERROR ── */
.feedback-box {
  text-align:center; padding:60px 24px;
  color:var(--muted);
}
.feedback-box .icon { font-size:3rem; margin-bottom:14px; opacity:.5; }
.feedback-box h3 { font-size:1.1rem; font-weight:700; color:white; margin-bottom:8px; }
.feedback-box p  { font-size:.88rem; line-height:1.7; max-width:380px; margin:0 auto 20px; }

/* Skeleton loader */
.skeleton-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(360px,1fr));
  gap:16px;
}
.skeleton-card {
  background:rgba(5,20,60,.4);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 20px;
  animation:shimmer 1.6s ease-in-out infinite;
}
@keyframes shimmer {
  0%,100% { opacity:.5; }
  50%      { opacity:1; }
}
.sk-line {
  height:12px; background:rgba(100,160,255,.12);
  border-radius:6px; margin-bottom:10px;
}
.sk-circle { width:38px; height:38px; border-radius:50%; background:rgba(100,160,255,.12); flex-shrink:0; }

/* ── BACK TO TOP ── */
#backToTop {
  position:fixed; bottom:28px; right:24px; z-index:100;
  width:42px; height:42px; border-radius:50%;
  background:rgba(11,61,145,.6); border:1px solid var(--border);
  color:var(--blue-light); font-size:1.1rem;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; opacity:0; pointer-events:none;
  transition:opacity .3s, transform .3s;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
#backToTop.show { opacity:1; pointer-events:all; transform:translateY(0); }
#backToTop:hover { background:rgba(26,91,181,.7); }

/* ── FOOTER ── */
.page-footer {
  text-align:center;
  padding:24px;
  font-size:.72rem;
  color:rgba(150,190,255,.3);
  border-top:1px solid var(--border);
}

/* ── RESPONSIVE ── */
@media(max-width:600px) {
  .hero { padding:36px 16px 24px; }
  .hero-title { font-size:1.5rem; }
  .posts-grid { grid-template-columns:1fr; }
  .posts-wrap { padding:0 14px 40px; }
  .filter-bar { padding:0 14px 22px; }
}

  alerta: '⚠️ ALERTA',  promo: '🎁 PROMO', logro: '🏆 LOGRO'
};
var TIPO_CLASSES = {
  novedad: 'tipo-novedad', tip: 'tipo-tip',
  alerta: 'tipo-alerta',   promo: 'tipo-promo', logro: 'tipo-logro'
};

// ── INIT ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function () {
  loadPosts();
  initScrollBehaviors();
});

// ── LOAD POSTS ────────────────────────────────────────
// Usa fetch directo a la REST API de Supabase — evita el DataCloneError
// que genera el cliente JS al intentar serializar Headers via postMessage.
async function loadPosts() {
  try {
    var url = SUPABASE_URL
      + '/rest/v1/posts_comunidad'
      + '?publicado=eq.true'
      + '&order=destacado.desc,created_at.desc'
      + '&select=id,titulo,cuerpo,emoji,tipo,imagen_url,destacado,created_at';

    var res = await fetch(url, {
      headers: {
        'apikey':        SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });

    if (!res.ok) {
      console.warn('[SB] loadPosts HTTP:', res.status);
      allPosts = getFallbackPosts();
    } else {
      var data = await res.json();
      allPosts = Array.isArray(data) ? data : getFallbackPosts();
    }
  } catch (e) {
    var msg = (e && e.message) ? e.message : 'error de red';
    console.warn('[SB] loadPosts:', msg);
    allPosts = getFallbackPosts();
  }

  hideSkeleton();
  render();
}

function hideSkeleton() {
  var sk = document.getElementById('skeletonLoader');
  var ct = document.getElementById('postsContent');
  if (sk) sk.style.display = 'none';
  if (ct) ct.style.display = 'block';
}

// ── FILTER ────────────────────────────────────────────
function setFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(function (btn) {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  render();
}

function getFiltered() {
  if (activeFilter === 'all') return allPosts;
  return allPosts.filter(function (p) { return p.tipo === activeFilter; });
}

// ── RENDER ────────────────────────────────────────────
function render() {
  var filtered  = getFiltered();
  var featured  = filtered.filter(function (p) { return p.destacado; });
  var regular   = filtered.filter(function (p) { return !p.destacado; });
  var container = document.getElementById('postsContent');

  if (!filtered.length) {
    container.innerHTML = renderEmpty();
    return;
  }

  var html = '';

  // Destacados primero
  if (featured.length) {
    html += '<div class="featured-section">'
      +   '<div class="section-label">⭐ Destacados</div>'
      +   '<div class="posts-grid">' + featured.map(renderCard).join('') + '</div>'
      + '</div>';
  }

  // Regulares
  if (regular.length) {
    var label = featured.length ? 'Más novedades' : 'Novedades';
    html += '<div>'
      +   '<div class="section-label">🌊 ' + label + '</div>'
      +   '<div class="posts-grid">' + regular.map(renderCard).join('') + '</div>'
      + '</div>';
  }

  container.innerHTML = html;
}

function renderCard(post) {
  var tipoClass = TIPO_CLASSES[post.tipo] || 'tipo-novedad';
  var tipoLabel = TIPO_LABELS[post.tipo]  || '📣 NOVEDAD';
  var fecha = post.created_at
    ? new Date(post.created_at).toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' })
    : '';

  var imgHtml = post.imagen_url
    ? '<img src="' + esc(post.imagen_url) + '" alt="" class="post-img" loading="lazy" onerror="this.style.display=\'none\'">'
    : '';

  return '<article class="post-card' + (post.destacado ? ' featured' : '') + '">'
    + imgHtml
    + '<div class="post-card-header">'
    +   '<div class="post-emoji-wrap">' + (post.emoji || '📣') + '</div>'
    +   '<div class="post-title-wrap">'
    +     '<div class="post-title">' + esc(post.titulo) + '</div>'
    +     '<div class="post-badges">'
    +       '<span class="badge-tipo ' + tipoClass + '">' + tipoLabel + '</span>'
    +       (post.destacado ? '<span class="badge-featured">★ Destacado</span>' : '')
    +     '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="post-card-body">'
    +   '<div class="post-body-text">' + escNl(post.cuerpo) + '</div>'
    + '</div>'
    + '<div class="post-card-footer">'
    +   '<span class="post-date">' + fecha + '</span>'
    +   '<span class="post-equipo">Equipo Luazul</span>'
    + '</div>'
    + '</article>';
}

function renderEmpty() {
  var msgs = {
    all:     { icon:'🌊', title:'La comunidad está recién arrancando', sub:'El equipo Luazul publicará novedades y tips para tu viaje pronto. ¡Volvé a revisar en unos días!' },
    novedad: { icon:'📣', title:'Sin novedades por ahora',             sub:'Cuando el equipo tenga novedades importantes, las verás aquí.' },
    tip:     { icon:'💡', title:'Sin tips por ahora',                  sub:'Pronto vas a encontrar consejos útiles para preparar tu viaje.' },
    alerta:  { icon:'✅', title:'Sin alertas',                         sub:'Todo en orden por ahora. Buenas noticias.' },
    promo:   { icon:'🎁', title:'Sin promos activas',                  sub:'Cuando haya promos disponibles, las verás aquí.' },
    logro:   { icon:'🏆', title:'Sin logros publicados',               sub:'Próximamente.' },
  };
  var m = msgs[activeFilter] || msgs.all;
  return '<div class="feedback-box">'
    + '<div class="icon">' + m.icon + '</div>'
    + '<h3>' + m.title + '</h3>'
    + '<p>' + m.sub + '</p>'
    + '<button onclick="window.open(\'https://wa.me/5492974726449\',\'_blank\')"'
    +   ' style="padding:10px 24px;border-radius:25px;border:none;background:linear-gradient(135deg,#1a5bb5,#0B3D91);color:#fff;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;">💬 Contactar al equipo</button>'
    + '</div>';
}

// ── FALLBACK (si Supabase no responde) ───────────────
function getFallbackPosts() {
  return [
    {
      id: 'f1', titulo: 'Bienvenidos a la Comunidad Luazul',
      cuerpo: 'Este es el espacio de la comunidad de viajeros Luazul Smart Travel. Acá vas a encontrar novedades, tips para preparar tu viaje y actualizaciones del equipo.',
      emoji: '🌊', tipo: 'novedad', destacado: true,
      created_at: new Date().toISOString(), imagen_url: null
    },
    {
      id: 'f2', titulo: 'Tip: Documentación para viajar',
      cuerpo: 'Argentinos, uruguayos y paraguayos ingresan a Brasil con DNI. Los chilenos necesitan pasaporte vigente. Revisá la fecha de vencimiento con anticipación.',
      emoji: '🛂', tipo: 'tip', destacado: false,
      created_at: new Date(Date.now() - 86400000).toISOString(), imagen_url: null
    },
    {
      id: 'f3', titulo: 'Chip de internet en Brasil',
      cuerpo: 'Comprá un chip de Claro o Vivo en el aeropuerto al llegar. Por USD 5-10 tenés internet los 7 días del viaje. Mucho más económico que el roaming.',
      emoji: '📱', tipo: 'tip', destacado: false,
      created_at: new Date(Date.now() - 172800000).toISOString(), imagen_url: null
    }
  ];
}

// ── SCROLL BEHAVIORS ─────────────────────────────────
function initScrollBehaviors() {
  var btn = document.getElementById('backToTop');
  window.addEventListener('scroll', function () {
    btn.classList.toggle('show', window.scrollY > 400);
  }, { passive: true });
}

// ── UTILS ─────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Escapa y respeta saltos de línea
function escNl(str) {
  return esc(str).replace(/\n/g, '<br>');
}
</script>
</body>
</html>
